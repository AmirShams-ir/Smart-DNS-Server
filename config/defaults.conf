###############################################################################
# Smart DNS Server
# Default Configuration
###############################################################################

SMARTDNS_VERSION="1.0.0-beta1"

###############################################################################
# Network
###############################################################################

ENABLE_IPV6="no"

DNS_PORT="53"

DNS_INTERFACE="127.0.0.1"

###############################################################################
# Performance
###############################################################################

CACHE_MIN_TTL="300"

CACHE_MAX_TTL="86400"

CACHE_MSG_SIZE="64m"

CACHE_RRSET_SIZE="128m"

THREADS="auto"

PREFETCH="yes"

SERVE_EXPIRED="yes"

###############################################################################
# Security
###############################################################################

DNSSEC="no"

QNAME_MINIMISATION="yes"

HIDE_VERSION="yes"

HIDE_IDENTITY="yes"

###############################################################################
# Benchmark
###############################################################################

BENCHMARK_INTERVAL="6h"

PING_TIMEOUT="1"

DIG_TIMEOUT="2"

###############################################################################
# Logging
###############################################################################

LOG_DIR="/var/log/smartdns"

###############################################################################
# Block Mode
###############################################################################

BLOCK_MODE=nxdomain